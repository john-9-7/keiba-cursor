# Render Blueprint（無料 Web サービス向け・永続ディスクなし）
#
# Render の Free プランには永続ディスクが付けられません。蓄積は再起動・再デプロイで
# 消えることがあります。無料のままデータを手元に残すには次を参照してください。
#   docs/操作手順.md の「7. 蓄積データの場所とバックアップ」
#
# render.yaml を Blueprint に接続する場合、name / region は環境に合わせて変更してください。
# 既に別プランで運用中なら、plan 行はダッシュボードの実態に合わせて編集・削除してください。
#
services:
  - type: web
    name: keiba-cursor
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
