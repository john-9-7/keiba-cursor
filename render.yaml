# Render Blueprint（無料 Web サービス向け・永続ディスクなし）
#
# 蓄積（snapshots.jsonl / results.jsonl）は手元PCの localhost 運用を推奨します。
# 本番URLだけで蓄積APIを使うと、再起動・再デプロイで消えることがあります。
# 手元PCでの手順: docs/操作手順.md §7・付録A、docs/ACCUMULATOR.md
#
# render.yaml を Blueprint に接続する場合、name / region は環境に合わせて変更してください。
# 既に別プランで運用中なら、plan 行はダッシュボードの実態に合わせて編集・削除してください。
#
services:
  - type: web
    name: keiba-cursor
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
